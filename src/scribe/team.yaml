# Scribe's team roster — the tools scribe knows about.
#
# This is a static data file, not cross-repo aggregation (see GUARD-002).
# Edit this file as the stack grows. Scribe exposes it via the
# `scribe_team` MCP tool so any card-writing caller can reach for the
# right teammate by name + one-liner + when-to-reach-for.
#
# Scribe doesn't enforce this list. Nothing breaks if a team member is
# missing here. But cards that reference teammates should use the names
# and one-liners in this file so the language stays consistent.

version: 0

team:
  - name: hone
    one_liner: Self-improvement MCP — point at anything; each tick tries to make it better; notebook-per-target is the trajectory
    when_to_reach_for: you want a loop that incrementally improves a target across sessions
    invoke: mcp__hone__hone_tick(target?, count?=1)

  - name: scribe
    one_liner: Per-repo documentarian — keeps a repo's authoritative self-description current as other tools change it
    when_to_reach_for: you just landed a change to a repo and the card needs updating
    invoke: mcp__scribe__scribe_update(repo, change_summary, new_card?, author_tool?)

  - name: stepproof
    one_liner: Ceremony enforcement — runbook-driven plans with evidence gates and hash-chained audit
    when_to_reach_for: high-stakes runs where off-plan actions must be gated, not just logged
    invoke: mcp__stepproof__stepproof_run_start / stepproof_step_complete

  - name: lighthouse
    one_liner: Trajectory guidance — north stars, hypotheses, drift detection, trial promotion
    when_to_reach_for: multi-iteration autonomous work that needs to know if it's on course
    invoke: mcp__lighthouse__lighthouse_set_north_star + lighthouse_tick

  - name: ike
    one_liner: Execution forge — tasks, milestones, Definition of Done under visionlog contracts
    when_to_reach_for: work that can't land this session and needs a durable task with acceptance criteria
    invoke: mcp__ike__task_create

  - name: visionlog
    one_liner: Static contract keeper — vision, goals, guardrails, SOPs, ADRs. The St. Peter that says no.
    when_to_reach_for: before a risky change, to confirm you won't break a guardrail; or to record a decision as an ADR
    invoke: mcp__visionlog__vision_view / guardrail_list / decision_create

  - name: research-md
    one_liner: Decision forge — evidence-graded, phase-gated, peer-reviewed decisions before they become visionlog ADRs
    when_to_reach_for: a consequential decision that needs evidence earned before execution begins
    invoke: mcp__research-md__candidate_create / project_decide

  - name: omni
    one_liner: Cross-repo memory/search — indexes across all repos; the meta layer above scribe
    when_to_reach_for: cross-repo recall — "what tool does X", "show me everything about Y"
    invoke: mcp__omni__omni_search

  # Non-MCP tools worth knowing about
  - name: loss-loop
    kind: script
    one_liner: Generic measure → improve → keep/revert loop at the repo level (hone borrowed this pattern)
    when_to_reach_for: you want a Python script (not an MCP) to run an improvement loop
    invoke: python ~/repos-eidos-agi/loss-loop/loop.py --target X --loops N

  - name: improve-forge
    kind: skill
    one_liner: /improve slash command — scores a project on 9 dimensions, fixes the biggest gap
    when_to_reach_for: hone's Change phase for a repo that doesn't declare its own improve strategy
    invoke: "/improve (in a Claude Code session)"

  - name: learning-forge
    kind: skill
    one_liner: /learn slash command — captures session learnings and routes them to the file a future agent will read
    when_to_reach_for: end of a session with non-obvious learnings worth propagating
    invoke: "/learn (in a Claude Code session)"

  - name: mcp-self-report
    kind: library
    one_liner: Adds report() and known_issues() tools to any FastMCP server, backed by a shared issues database
    when_to_reach_for: building a new MCP and want cross-server issue tracking for free
    invoke: "pip + register_self_report(mcp, server_name=...)"
